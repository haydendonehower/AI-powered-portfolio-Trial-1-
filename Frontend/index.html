<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Portfolio Analyzer</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
</head>
<body>
    <div class="page-wrapper">
        <!-- Header -->
        <header class="header">
            <div class="header-content">
                <h1>AI Portfolio Analyzer</h1>
                <p class="header-subtitle">Real-time portfolio insights powered by intelligent analysis</p>
            </div>
        </header>

        <!-- Input Section -->
        <section class="input-section">
            <div class="input-container">
                <div class="input-group">
                    <label for="tickers">Enter Stock Tickers</label>
                    <input type="text" id="tickers" placeholder="e.g., AAPL, MSFT, TSLA" />
                </div>

                <div class="input-divider">or</div>

                <div class="input-group">
                    <label for="csvFile">Upload CSV</label>
                    <input type="file" id="csvFile" accept=".csv,.txt" />
                </div>

                <button id="analyzeBtn" class="btn-primary">Analyze Portfolio</button>
            </div>
        </section>

        <!-- Results Section -->
        <section id="results" class="results-section" style="display: none;">
            <div class="results-toolbar">
                <h2>Portfolio Analysis Results</h2>
                <button id="downloadPdfBtn" class="btn-secondary">📥 Download PDF</button>
            </div>

            <!-- Top Row: Charts + Summary (3 Cards Horizontal) -->
            <div class="results-top-row">
                <div class="result-card chart-card">
                    <h3>Sector Breakdown</h3>
                    <canvas id="sectorChart"></canvas>
                </div>
                <div class="result-card chart-card">
                    <h3>P/E Ratio Analysis</h3>
                    <canvas id="peChart"></canvas>
                </div>
                <div class="result-card summary-card">
                    <h3>Portfolio Summary</h3>
                    <div id="summaryStats" class="summary-stats"></div>
                </div>
            </div>

            <!-- Individual Stocks Grid (6 Columns, Ultra-Wide) -->
            <div class="stocks-section">
                <h2>Individual Stock Analysis</h2>
                <div id="stocksGrid" class="stocks-grid"></div>
            </div>

            <!-- Detailed Analysis (Compact Table Layout) -->
            <div class="analysis-section">
                <h2>Detailed Analysis Report</h2>
                <div class="analysis-summary" id="analysisSummary"></div>
                <div class="stocks-table-wrapper">
                    <table id="stocksTable" class="stocks-table">
                        <thead>
                            <tr>
                                <th>Ticker</th>
                                <th>Price</th>
                                <th>P/E Ratio</th>
                                <th>Div Yield</th>
                                <th>Sector</th>
                            </tr>
                        </thead>
                        <tbody id="stocksTableBody">
                        </tbody>
                    </table>
                </div>
                <div id="analysisOutput" class="analysis-output" style="display: none;"></div>
            </div>
        </section>
    </div>

    <script src="script.js"></script>
</body>
</html>
